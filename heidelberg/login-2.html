<!doctype html>
<html lang="fr">

  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Heidelberg Materials</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="icon" href="assets/img/favicon.ico" sizes="any">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@500&display=swap">
    <link rel="stylesheet" href="assets/css/style.css">
  </head>

  <body>

    <div class="wrapper">

      <header class="header header-guest">
        <div class="header-container">
          <div class="container m-max-w-1864">
            <h2 class="header-title m-sr">Heidelberg Materials</h2>
            <div class="header-logo">
              <img class="m-d-hidden-md m-d-hidden-lg m-w-auto m-max-w-full m-h-full m-obj-contain" src="assets/img/logo-hm-1.png" alt="Heidelberg Materials" width="1040" height="300">
              <img class="m-d-hidden-xs m-d-hidden-sm m-w-auto m-max-w-full m-h-full m-obj-contain" src="assets/img/logo-hm-2.png" alt="Heidelberg Materials" width="2460" height="300">
            </div>
          </div>
        </div>
        <div class="header-holder"></div>
      </header>
      <!-- header -->

      <main class="main">

        <section class="form">
          <div class="container m-max-w-1164">
            <div class="form-body">
              <h1 class="form-title m-font-lexend-exa-hm m-font-bold">Bienvenue dans votre espace d&eacute;di&eacute; partenaires affr&eacute;t&eacute;s</h1>
              <div class="form-container">
                <div class="form-control">
                  <label class="form-label m-d-inline-block error" for="fI1">Identifiant ou adresse email :</label>
                  <input class="form-input m-w-full error" type="email" id="fI1" name="fI1" required>
                </div>
                <div class="form-control">
                  <label class="form-label m-d-inline-block" for="fI2">Mot de passe :</label>
                  <input class="form-input m-w-full" type="password" id="fI2" name="fI2" required>
                </div>
                <div class="form-info m-font-lexend m-font-medium m-text-end">
                  <a href="#">Mot de passe oubli&eacute; ?</a>
                </div>
                <div class="form-message m-d-flex m-flex-jc-start m-flex-ai-center">
                  <span class="form-message--icon m-flex-none m-d-block">
                    <svg width="100%" height="100%" aria-hidden="true" focusable="false">
                      <use href="assets/img/sprites.svg#info"></use>
                    </svg>
                  </span>
                  <em class="form-message--text m-flex-auto m-d-block">Email et/ou le mot de passe ne peut &ecirc;tre vide</em>
                </div>
                <label class="form-check i1 m-d-inline-flex m-flex-jc-start m-flex-ai-center error">
                  <input class="form-check--input error" type="checkbox">
                  <span class="form-check--icon m-flex-none m-d-block">
                    <svg width="100%" height="100%" aria-hidden="true" focusable="false">
                      <use href="assets/img/sprites.svg#check"></use>
                    </svg>
                  </span>
                  <em class="form-check--text m-flex-auto m-d-block">Se souvenir de moi</em>
                </label>
                <div class="form-button">
                  <button class="button button-bright-green button-fill m-d-inline-block m-font-lexend m-font-medium m-text-center" type="submit">Se connecter</button>
                </div>
              </div>
              <section class="form-section">
                <h2 class="form-section--title">Pas encore inscrit ?</h2>
                <div class="form-section--button">
                  <a class="button button-deep-green button-outline m-d-inline-block m-font-lexend m-font-medium m-text-center" href="#">Cr&eacute;ez votre compte</a>
                </div>
              </section>
            </div>
            <div class="form-aside">
              <div class="form-banner m-of-hidden">
                <img class="m-w-full m-h-full m-obj-cover" src="assets/img/img-1.jpg" alt="Image" width="1650" height="2052">
              </div>
              <div class="form-ribbon"></div>
            </div>
          </div>
        </section>
        <!-- form -->

      </main>
      <!-- main -->

    </div>
    <!-- wrapper -->

    <script src="assets/js/plugins.min.js"></script>
    <script src="assets/js/script.js"></script>
    <!-- script -->

  </body>

</html>
