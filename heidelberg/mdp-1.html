<!doctype html>
<html lang="fr">

  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Heidelberg Materials</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="icon" href="assets/img/favicon.ico" sizes="any">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@500&display=swap">
    <link rel="stylesheet" href="assets/css/style.css">
  </head>

  <body>

    <div class="wrapper">

      <header class="header header-guest">
        <div class="header-container">
          <div class="container m-max-w-1864">
            <h2 class="header-title m-sr">Heidelberg Materials</h2>
            <div class="header-logo">
              <img class="m-d-hidden-md m-d-hidden-lg m-w-auto m-max-w-full m-h-full m-obj-contain" src="assets/img/logo-hm-1.png" alt="Heidelberg Materials" width="1040" height="300">
              <img class="m-d-hidden-xs m-d-hidden-sm m-w-auto m-max-w-full m-h-full m-obj-contain" src="assets/img/logo-hm-2.png" alt="Heidelberg Materials" width="2460" height="300">
            </div>
          </div>
        </div>
        <div class="header-holder"></div>
      </header>
      <!-- header -->

      <main class="main">

        <section class="form">
          <div class="container m-max-w-1164">
            <div class="form-body">
              <h1 class="form-title m-font-lexend-exa-hm m-font-bold">Mot de passe oubli&eacute;</h1>
              <div class="form-summary">Veuillez saisir votre votre adresse de messagerie.<br>Un lien permettant de cr&eacute;er un nouveau mot de passe vous sera envoy&eacute; par e-mail.</div>
              <div class="form-container">
                <div class="form-control">
                  <label class="form-label m-d-inline-block" for="fI1">Adresse email :</label>
                  <input class="form-input m-w-full" type="email" id="fI1" name="fI1" required>
                </div>
                <div class="form-button">
                  <button class="button button-bright-green button-fill m-d-inline-block m-font-lexend m-font-medium m-text-center" type="submit">R&eacute;initialiser mon mot de passe</button>
                </div>
                <div class="form-link">
                  <a class="button button-deep-green button-outline m-d-inline-block m-font-lexend m-font-medium m-text-center" href="#">Retour</a>
                </div>
              </div>
            </div>
            <div class="form-aside">
              <div class="form-banner m-of-hidden">
                <img class="m-w-full m-h-full m-obj-cover" src="assets/img/img-1.jpg" alt="Image" width="1650" height="2052">
              </div>
              <div class="form-ribbon"></div>
            </div>
          </div>
        </section>
        <!-- form -->

      </main>
      <!-- main -->

    </div>
    <!-- wrapper -->

    <script src="assets/js/plugins.min.js"></script>
    <script src="assets/js/script.js"></script>
    <!-- script -->

  </body>

</html>
