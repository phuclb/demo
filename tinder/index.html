<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Tinder</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="icon" href="favicon.png" sizes="any">
    <link rel="stylesheet" href="https://public.codepenassets.com/css/normalize-5.0.0.min.css">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <div class="tinder--container">
      <div class="tinder--list">
        <div class="tinder--card" data-card-id="1">
          <img src="https://picsum.photos/seed/a/600/300/">
          <h3>Card 1</h3>
          <p>This is a demo for Tinder-like card</p>
        </div>
        <div class="tinder--card" data-card-id="2">
          <img src="https://picsum.photos/seed/b/600/300/">
          <h3>Card 2</h3>
          <p>This is a demo for Tinder-like card</p>
        </div>
        <div class="tinder--card" data-card-id="3">
          <img src="https://picsum.photos/seed/c/600/300/">
          <h3>Card 3</h3>
          <p>This is a demo for Tinder-like card</p>
        </div>
        <div class="tinder--card" data-card-id="4">
          <img src="https://picsum.photos/seed/d/600/300/">
          <h3>Card 4</h3>
          <p>This is a demo for Tinder-like card</p>
        </div>
        <div class="tinder--card" data-card-id="5">
          <img src="https://picsum.photos/seed/e/600/300/">
          <h3>Card 5</h3>
          <p>This is a demo for Tinder-like card</p>
        </div>
      </div>
      <div class="tinder--button">
        <button class="back" id="back">Back</button>
        <button class="nope" id="nope">Nope</button>
        <button class="love" id="love">Love</button>
      </div>
      <div class="tinder--button">
        <button class="result" id="result">Result</button>
      </div>
    </div>

    <script src="hammer.min.js" defer></script>
    <script src="script.js" defer></script>

  </body>
</html>
